server:
  port: 8081

spring:
  application:
    name: shadcn-admin-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/shadcn_admin?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mappers/**/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    com.shadcn.admin.backend: INFO

app:
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:local-dev-jwt-secret-change-me-2026-02-18}
    token-expire-seconds: ${APP_AUTH_TOKEN_EXPIRE_SECONDS:7200}
    refresh-token-expire-seconds: ${APP_AUTH_REFRESH_TOKEN_EXPIRE_SECONDS:604800}
    access-cookie-name: ${APP_AUTH_ACCESS_COOKIE_NAME:access_token}
    refresh-cookie-name: ${APP_AUTH_REFRESH_COOKIE_NAME:refresh_token}
    cookie-secure: false
    allow-register: false
  backup:
    output-dir: ${APP_BACKUP_OUTPUT_DIR:backups/sql}
    mysqldump-executable: ${MYSQLDUMP_EXECUTABLE:mysqldump}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    admin-username: ${APP_SEED_ADMIN_USERNAME:admin@example.com}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:Admin@123}
    admin-real-name: ${APP_SEED_ADMIN_REAL_NAME:admin}
    admin-email: ${APP_SEED_ADMIN_EMAIL:admin@example.com}
