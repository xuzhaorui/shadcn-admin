server:
  port: 8080

spring:
  application:
    name: shadcn-admin-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/shadcn_admin?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: root

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mappers/**/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.shadcn.admin.backend: INFO

app:
  auth:
    jwt-secret: local-dev-jwt-secret-change-me-2026-02-18
    token-expire-seconds: 7200
